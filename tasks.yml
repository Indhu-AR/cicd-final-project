
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
spec:
  steps:
    - name: cleanup
      image: node:18
      script: |
        #!/bin/bash
        echo "Cleaning workspace..."
        rm -rf /workspace/* || true
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jest-test-task
spec:
  steps:
    - name: run-tests
      image: node:18
      script: |
        #!/bin/bash
        npm install
        echo "Running unit tests..."
        npm test
